<section class="references-section">
  <h2 class="references-title">{{ 'references.title' | translate }}</h2>

  <div 
    class="references-carousel" 
    (touchstart)="onTouchStart($event)" 
    (touchend)="onTouchEnd($event)"
  >
    <div 
      class="references-track" 
      [style.transform]="transformStyle" 
      [class.no-transition]="disableTransition"
      (transitionend)="onTransitionEnd()"
    >

    <div class="reference-slide" *ngFor="let item of references">
      <a 
        class="reference-frame" 
        [href]="item.url" 
        target="_blank" 
        rel="noopener noreferrer"
      >

        <div class="scroll-preview">
          <img [src]="item.image" [alt]="item.caption" />
        </div>

        <div class="overlay-top">
          <h3 class="overlay-title">{{ item.name }}</h3>
          <span class="overlay-badge" [ngClass]="item.type">
            {{ 'references.badge.' + item.type | translate }}
          </span>
        </div>

        <div class="overlay-bottom">
          {{ item.caption }}
        </div>

      </a>
    </div>

    </div>

    <button class="nav-button prev" (click)="prevSlide()">&#10094;</button>
    <button class="nav-button next" (click)="nextSlide()">&#10095;</button>

    <div class="indicator-dots">
      <span 
        class="dot" 
        *ngFor="let item of referencesRaw; let i = index" 
        [class.active]="getActiveDotIndex() === i"
      ></span>
    </div>
  </div>
</section>
